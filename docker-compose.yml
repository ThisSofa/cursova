version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: inventory_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: inventory
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql

  api:
    build: ./backend
    container_name: inventory_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://user:password@db:3306/inventory
    depends_on:
      - db

  web:
    build: ./frontend
    container_name: inventory_web
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  db_data:
